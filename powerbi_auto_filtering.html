<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Warehouse 3D Viewer - Fixed Close Zoom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="viewer"></div>

    <script>
        // Container mapping - UPDATE WITH YOUR ACTUAL CONTAINER NAMES
        const CSV_CONTAINERS = [
            { name: 'Container_Red', materialName: 'test1', color: 0xff0000 },
            { name: 'Container_Green', materialName: 'test2', color: 0x00ff00 },
            { name: 'Container_Blue', materialName: 'test3', color: 0x0000ff },
            { name: 'Container_Purple', materialName: 'test', color: 0x800080 },
            { name: 'Container_Cyan', materialName: 'test', color: 0x00ffff }
        ];

        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const urlSelectedContainer = getURLParameter('container');
        console.log('🎯 Selected container:', urlSelectedContainer);

        let scene, camera, renderer, controls;
        let model = null;
        let primitives = [];
        let glbLoaded = false;

        function init() {
            const container = document.getElementById('viewer');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f5f5);
            
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 6, 8);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(10, 10, 5);
            scene.add(dirLight1);
            
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({ color: 0xdddddd })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);
            
            scene.add(new THREE.GridHelper(20, 20, 0xcccccc, 0xe0e0e0));
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            loadGLB();
            animate();
            
            window.addEventListener('resize', onResize);
        }

        function loadGLB() {
            const loader = new THREE.GLTFLoader();
            const glbUrl = 'https://sharifsharifzada.github.io/warehouse-3d-viewer/WareHouseIDTest_05.glb';
            
            console.log('📦 Loading:', glbUrl);
            
            loader.load(
                glbUrl,
                (gltf) => {
                    console.log('✅ GLB Loaded');
                    
                    model = gltf.scene;
                    scene.add(model);
                    
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    model.position.set(-center.x, -center.y + size.y/2, -center.z);
                    
                    extractPrimitives();
                    fitCamera();
                    
                    glbLoaded = true;
                    
                    // Auto-select if URL parameter exists
                    if (urlSelectedContainer) {
                        setTimeout(() => autoSelect(urlSelectedContainer), 300);
                    } else {
                        console.log('📦 No selection - showing full model');
                    }
                },
                null,
                (error) => {
                    console.error('❌ Error loading GLB:', error);
                }
            );
        }

        function extractPrimitives() {
            let primitiveIndex = 0;
            
            model.traverse((child) => {
                if (child.isMesh) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach((mat, idx) => {
                            primitives.push({
                                primitiveID: primitiveIndex,
                                mesh: child,
                                materialIndex: idx,
                                materialName: mat.name || 'Unnamed',
                                meshName: child.name || 'Unnamed',
                                originalMaterial: mat.clone(),
                                color: mat.color ? mat.color.getHex() : 0xcccccc
                            });
                            primitiveIndex++;
                        });
                    } else {
                        primitives.push({
                            primitiveID: primitiveIndex,
                            mesh: child,
                            materialIndex: -1,
                            materialName: child.material.name || 'Unnamed',
                            meshName: child.name || 'Unnamed',
                            originalMaterial: child.material.clone(),
                            color: child.material.color ? child.material.color.getHex() : 0xcccccc
                        });
                        primitiveIndex++;
                    }
                }
            });
            
            console.log(`✅ Found ${primitives.length} primitives`);
        }

        function autoSelect(containerName) {
            console.log('\n═══════════════════════════════');
            console.log('🎯 Auto-selecting:', containerName);
            
            const container = CSV_CONTAINERS.find(c => c.name === containerName);
            if (!container) {
                console.log('❌ Container not found in mapping');
                resetAllPrimitives();
                return;
            }
            
            const matchingPrim = primitives.find(p => p.materialName === container.materialName);
            if (!matchingPrim) {
                console.log('❌ No primitive with material:', container.materialName);
                resetAllPrimitives();
                return;
            }
            
            console.log('✅ Found primitive:', matchingPrim.primitiveID);
            
            // STEP 1: HIDE ALL primitives
            primitives.forEach((prim) => {
                prim.mesh.visible = false;
            });
            
            // STEP 2: SHOW ONLY the matched primitive
            matchingPrim.mesh.visible = true;
            
            // Make sure parents are visible
            let parent = matchingPrim.mesh.parent;
            while (parent) {
                parent.visible = true;
                parent = parent.parent;
            }
            
            // STEP 3: HIGHLIGHT with container's color
            const highlightMat = new THREE.MeshStandardMaterial({
                color: container.color,
                emissive: container.color,
                emissiveIntensity: 0.9,
                roughness: 0.2,
                metalness: 0.8
            });
            
            if (matchingPrim.materialIndex >= 0) {
                matchingPrim.mesh.material[matchingPrim.materialIndex] = highlightMat;
            } else {
                matchingPrim.mesh.material = highlightMat;
            }
            
            console.log('🎨 Highlighted in color:', container.color.toString(16));
            
            // STEP 4: ZOOM VERY CLOSE
            const box = new THREE.Box3().setFromObject(matchingPrim.mesh);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            
            // VERY CLOSE zoom - 0.8x (change to 0.5 for even closer)
            const dist = Math.max(maxDim * 0.8, 2);
            
            camera.position.set(
                center.x + dist * 0.6,
                center.y + dist * 0.7,
                center.z + dist * 0.6
            );
            camera.lookAt(center);
            controls.target.copy(center);
            
            console.log('📷 Camera zoomed VERY CLOSE');
            console.log('═══════════════════════════════\n');
        }

        function resetAllPrimitives() {
            console.log('🔄 Resetting to full view');
            
            // Show all primitives
            primitives.forEach((prim) => {
                prim.mesh.visible = true;
                
                // Reset to original material
                if (prim.materialIndex >= 0) {
                    prim.mesh.material[prim.materialIndex] = prim.originalMaterial.clone();
                } else {
                    prim.mesh.material = prim.originalMaterial.clone();
                }
            });
            
            // Zoom out to full view
            fitCamera();
        }

        function fitCamera() {
            if (!model) return;
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const dist = maxDim * 2;
            camera.position.set(center.x + dist, center.y + dist * 0.7, center.z + dist);
            camera.lookAt(center);
            controls.target.copy(center);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
