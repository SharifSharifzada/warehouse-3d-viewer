<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warehouse 3D Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:#0b0c0e;
  --surface:#13151a;
  --surface2:#1c1f27;
  --border:rgba(255,255,255,0.06);
  --accent:#ff6a00;
  --text:#e8e9eb;
  --muted:#5a6072;
  --danger:#ff5c5c;
  --success:#3effa0;
}
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
#canvas-wrap { position:fixed; inset:0; }
#canvas-wrap canvas { display:block; width:100%!important; height:100%!important; }
</style>
</head>

<body>

<div id="canvas-wrap"></div>

<script>

// CONFIG
const CONFIG = {
  glbUrl:'https://sharifsharifzada.github.io/warehouse-3d-viewer/warehouse-3d-with-textures1.glb',
  highlightColor:0x00ffff,     // Bright Cyan (high visibility)
  highlightEmissive:4.0,      // Strong glow
  cameraLerp:0.08,
  cameraZoom:2.0,
  cameraMinDist:0.3,
  cameraMaxDist:50
};

// URL PARAMS
const params=new URLSearchParams(window.location.search);
const urlNodeIndex=params.get('nodeindex')!==null?parseInt(params.get('nodeindex')):-1;

// STATE
let scene,camera,renderer,controls,model;
let nodeIndexMap=new Map();
let highlighted=null;
let camAnimTarget=null;
let isAnimating=false;
let pulseTime=0;

// INIT
function init(){
  const wrap=document.getElementById('canvas-wrap');

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0b0c0e);

  camera=new THREE.PerspectiveCamera(45,wrap.clientWidth/wrap.clientHeight,0.1,2000);
  camera.position.set(20,14,20);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.75));
  const sun=new THREE.DirectionalLight(0xffffff,1);
  sun.position.set(30,50,20);
  scene.add(sun);

  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  controls.dampingFactor=0.07;
  controls.minDistance=0.2;
  controls.maxDistance=500;

  window.addEventListener('resize',onResize);
  loadModel();
  animate();
}

// LOAD MODEL
function loadModel(){
  const loader=new THREE.GLTFLoader();
  loader.load(CONFIG.glbUrl,function(gltf){

    model=gltf.scene;
    let index=0;

    model.traverse(obj=>{
      if(!obj.isMesh)return;
      nodeIndexMap.set(index,{
        node:obj,
        origMat:obj.material
      });
      index++;
    });

    scene.add(model);
    fitCamera();

    if(urlNodeIndex>=0){
      selectByIndex(urlNodeIndex);
    }

  });
}

// SELECT
function selectByIndex(index){
  const record=nodeIndexMap.get(index);
  if(!record)return;

  clearHighlight();
  applyHighlight(record);
  animateCameraTo(record.node);
}

// HIGHLIGHT
function applyHighlight(record){
  const orig=Array.isArray(record.origMat)?record.origMat:[record.origMat];
  const hl=orig.map(m=>{
    const h=m.clone();
    h.color=new THREE.Color(CONFIG.highlightColor);
    h.emissive=new THREE.Color(CONFIG.highlightColor);
    h.emissiveIntensity=CONFIG.highlightEmissive;
    h.map=null;
    return h;
  });

  record.node.material=hl.length===1?hl[0]:hl;
  record.node.renderOrder=1;

  // Slight scale increase
  record.node.scale.set(1.15,1.15,1.15);

  highlighted={record,hl};
}

function clearHighlight(){
  if(!highlighted)return;

  highlighted.record.node.material=highlighted.record.origMat;
  highlighted.record.node.renderOrder=0;

  // Reset scale
  highlighted.record.node.scale.set(1,1,1);

  highlighted.hl.forEach(m=>m.dispose());
  highlighted=null;
}

// CAMERA FOCUS
function animateCameraTo(obj){
  const box=new THREE.Box3().setFromObject(obj);
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3());
  const maxDim=Math.max(size.x,size.y,size.z,0.3);

  const dist=Math.min(
    Math.max(maxDim*CONFIG.cameraZoom,CONFIG.cameraMinDist),
    CONFIG.cameraMaxDist
  );

  const newPos=new THREE.Vector3(
    center.x+dist*0.7,
    center.y+dist*0.6,
    center.z+dist*0.7
  );

  camAnimTarget={position:newPos,lookAt:center.clone()};
  isAnimating=true;
}

// FIT FULL MODEL
function fitCamera(){
  if(!model)return;
  const box=new THREE.Box3().setFromObject(model);
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3());
  const dist=Math.max(size.x,size.y,size.z)*1.5;

  camAnimTarget={
    position:new THREE.Vector3(
      center.x+dist*0.7,
      center.y+dist*0.5,
      center.z+dist*0.7
    ),
    lookAt:center.clone()
  };
  isAnimating=true;
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  if(isAnimating&&camAnimTarget){
    camera.position.lerp(camAnimTarget.position,CONFIG.cameraLerp);
    controls.target.lerp(camAnimTarget.lookAt,CONFIG.cameraLerp);

    if(camera.position.distanceTo(camAnimTarget.position)<0.02){
      isAnimating=false;
    }
  }

  // Pulse animation
  if(highlighted){
    pulseTime+=0.08;
    const pulse=1.15+Math.sin(pulseTime)*0.05;
    highlighted.record.node.scale.set(pulse,pulse,pulse);
  }

  controls.update();
  renderer.render(scene,camera);
}

// RESIZE
function onResize(){
  const wrap=document.getElementById('canvas-wrap');
  camera.aspect=wrap.clientWidth/wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
}

window.addEventListener('load',init);

</script>
</body>
</html>
