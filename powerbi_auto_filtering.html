<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Warehouse 3D Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; }

        #label {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.65);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
            display: none;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="viewer"></div>
    <div id="label"></div>

    <script>
        // ─── Container Mapping ───────────────────────────────────────────────
        // name        → must match the ?container= value sent from Power BI
        // materialName → must match the material name inside your GLB file
        // color        → highlight color for that container
        const CSV_CONTAINERS = [
            { name: 'Container_Red',    materialName: 'test1', color: 0xff3333 },
            { name: 'Container_Green',  materialName: 'test2', color: 0x33dd33 },
            { name: 'Container_Blue',   materialName: 'test3', color: 0x3399ff },
            { name: 'Container_Purple', materialName: 'test',  color: 0xaa44ff },
            { name: 'Container_Cyan',   materialName: 'test',  color: 0x00eeff }
        ];
        // ────────────────────────────────────────────────────────────────────

        function getURLParameter(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        const urlSelectedContainer = getURLParameter('container');
        console.log('🎯 Selected container from URL:', urlSelectedContainer);

        let scene, camera, renderer, controls;
        let model = null;
        let primitives = [];

        function init() {
            const container = document.getElementById('viewer');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 6, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const dir1 = new THREE.DirectionalLight(0xffffff, 0.9);
            dir1.position.set(10, 15, 5);
            dir1.castShadow = true;
            scene.add(dir1);
            const dir2 = new THREE.DirectionalLight(0xffffff, 0.3);
            dir2.position.set(-10, 5, -5);
            scene.add(dir2);

            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 30),
                new THREE.MeshStandardMaterial({ color: 0xdddddd })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            scene.add(new THREE.GridHelper(30, 30, 0xcccccc, 0xe0e0e0));

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 1;
            controls.maxDistance = 200;

            loadGLB();
            animate();
            window.addEventListener('resize', onResize);
        }

        function loadGLB() {
            const loader = new THREE.GLTFLoader();
            const glbUrl = 'https://sharifsharifzada.github.io/warehouse-3d-viewer/WareHouseIDTest_05.glb';
            console.log('📦 Loading GLB:', glbUrl);

            loader.load(
                glbUrl,
                (gltf) => {
                    console.log('✅ GLB loaded successfully');
                    model = gltf.scene;
                    scene.add(model);

                    // Centre the model on the ground
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size   = box.getSize(new THREE.Vector3());
                    model.position.set(-center.x, -center.y + size.y / 2, -center.z);

                    extractPrimitives();
                    fitCamera(); // always start with full-warehouse view

                    if (urlSelectedContainer) {
                        setTimeout(() => highlightContainer(urlSelectedContainer), 300);
                    }
                },
                (xhr) => {
                    if (xhr.total) console.log(`Loading: ${Math.round(xhr.loaded / xhr.total * 100)}%`);
                },
                (error) => {
                    console.error('❌ GLB load error:', error);
                }
            );
        }

        function extractPrimitives() {
            let idx = 0;
            model.traverse((child) => {
                if (!child.isMesh) return;
                const mats = Array.isArray(child.material) ? child.material : [child.material];
                mats.forEach((mat, mi) => {
                    primitives.push({
                        primitiveID:      idx++,
                        mesh:             child,
                        materialIndex:    Array.isArray(child.material) ? mi : -1,
                        materialName:     mat.name || 'Unnamed',
                        meshName:         child.name || 'Unnamed',
                        originalMaterial: mat.clone()
                    });
                });
            });
            console.log(`✅ Extracted ${primitives.length} primitives`);
            primitives.forEach(p =>
                console.log(`  [${p.primitiveID}] mesh="${p.meshName}" material="${p.materialName}"`)
            );
        }

        // ─── HIGHLIGHT: keeps whole model visible, dims others, glows selected ──
        function highlightContainer(containerName) {
            console.log('\n═══════════════════════════════');
            console.log('🎯 Highlighting:', containerName);

            const containerCfg = CSV_CONTAINERS.find(c => c.name === containerName);
            if (!containerCfg) {
                console.warn('❌ Container not found in CSV_CONTAINERS mapping:', containerName);
                resetAllPrimitives();
                return;
            }

            const matchingPrim = primitives.find(p => p.materialName === containerCfg.materialName);
            if (!matchingPrim) {
                console.warn('❌ No GLB primitive with materialName:', containerCfg.materialName);
                resetAllPrimitives();
                return;
            }

            console.log(`✅ Match → primitive #${matchingPrim.primitiveID}, mesh="${matchingPrim.meshName}"`);

            // 1. Make sure every mesh is visible (full warehouse)
            primitives.forEach(p => { p.mesh.visible = true; });

            // 2. Dim non-selected primitives (greyed out, semi-transparent)
            const dimMat = new THREE.MeshStandardMaterial({
                color:       0xaaaaaa,
                transparent: true,
                opacity:     0.25,
                roughness:   1.0,
                metalness:   0.0
            });

            primitives.forEach(p => {
                if (p === matchingPrim) return; // skip selected
                if (p.materialIndex >= 0) {
                    p.mesh.material[p.materialIndex] = dimMat.clone();
                } else {
                    p.mesh.material = dimMat.clone();
                }
            });

            // 3. Apply glowing highlight to selected container
            const highlightMat = new THREE.MeshStandardMaterial({
                color:            containerCfg.color,
                emissive:         containerCfg.color,
                emissiveIntensity: 0.7,
                roughness:        0.2,
                metalness:        0.5
            });

            if (matchingPrim.materialIndex >= 0) {
                matchingPrim.mesh.material[matchingPrim.materialIndex] = highlightMat;
            } else {
                matchingPrim.mesh.material = highlightMat;
            }

            // 4. Show label
            const labelEl = document.getElementById('label');
            labelEl.textContent = '📦 ' + containerName;
            labelEl.style.display = 'block';
            labelEl.style.borderLeft = '4px solid #' + containerCfg.color.toString(16).padStart(6, '0');

            // 5. Camera: zoom in on selected container but keep warehouse context
            //    Pull back enough to see the whole warehouse, angled toward the target
            const selBox    = new THREE.Box3().setFromObject(matchingPrim.mesh);
            const selCenter = selBox.getCenter(new THREE.Vector3());
            const selSize   = selBox.getSize(new THREE.Vector3());
            const selMaxDim = Math.max(selSize.x, selSize.y, selSize.z);

            // Use full-model box for context distance
            const fullBox    = new THREE.Box3().setFromObject(model);
            const fullSize   = fullBox.getSize(new THREE.Vector3());
            const fullMaxDim = Math.max(fullSize.x, fullSize.y, fullSize.z);

            // Camera sits at a "medium" distance: close enough to see the highlight,
            // far enough to show the whole warehouse around it
            const dist = Math.max(selMaxDim * 3, fullMaxDim * 0.8);

            camera.position.set(
                selCenter.x + dist * 0.55,
                selCenter.y + dist * 0.60,
                selCenter.z + dist * 0.55
            );
            camera.lookAt(selCenter);
            controls.target.copy(selCenter);
            controls.update();

            console.log('🎨 Color:', '#' + containerCfg.color.toString(16).padStart(6,'0'));
            console.log('📷 Camera positioned with full-warehouse context');
            console.log('═══════════════════════════════\n');
        }

        function resetAllPrimitives() {
            console.log('🔄 Resetting all to original materials');
            document.getElementById('label').style.display = 'none';

            primitives.forEach(p => {
                p.mesh.visible = true;
                if (p.materialIndex >= 0) {
                    p.mesh.material[p.materialIndex] = p.originalMaterial.clone();
                } else {
                    p.mesh.material = p.originalMaterial.clone();
                }
            });

            fitCamera();
        }

        function fitCamera() {
            if (!model) return;
            const box    = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size   = box.getSize(new THREE.Vector3());
            const dist   = Math.max(size.x, size.y, size.z) * 2.2;
            camera.position.set(center.x + dist * 0.7, center.y + dist * 0.6, center.z + dist * 0.7);
            camera.lookAt(center);
            controls.target.copy(center);
            controls.update();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
