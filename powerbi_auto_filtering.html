<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warehouse 3D Viewer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#0b0c0e; }

#canvas-wrap { position:fixed; inset:0; }
#canvas-wrap canvas { width:100%!important; height:100%!important; display:block; }

#loading {
  position:fixed; inset:0; background:#0b0c0e;
  display:flex; align-items:center; justify-content:center;
  color:white; font-family:'DM Mono',monospace;
}
#btn-reset {
  position:fixed; bottom:20px; right:20px;
  padding:10px 15px; background:#13151a;
  color:white; border:1px solid rgba(255,255,255,0.1);
  border-radius:6px; cursor:pointer; display:none;
}
#btn-reset.visible { display:block; }
</style>
</head>

<body>

<div id="canvas-wrap"></div>
<div id="loading">Loading warehouse...</div>
<button id="btn-reset" onclick="resetView()">↩ Show All</button>

<script>

// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const CONFIG = {
  glbUrl: "https://sharifsharifzada.github.io/warehouse-3d-viewer/warehouse-3d-with-textures1.glb",
  highlightColor: 0xff6a00,
  highlightEmissive: 2.5,
  cameraLerp: 0.08,
  cameraZoom: 2.0,      // closer zoom
  cameraMinDist: 0.3,
  cameraMaxDist: 50
};

// URL PARAMS
const params = new URLSearchParams(window.location.search);
const urlNodeIndex = params.get("nodeindex") !== null ? parseInt(params.get("nodeindex")) : -1;

// STATE
let scene, camera, renderer, controls, model;
let nodeIndexMap = new Map();
let highlighted = null;
let camAnimTarget = null;
let isAnimating = false;

// INIT
function init() {
  const wrap = document.getElementById("canvas-wrap");

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b0c0e);

  camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 2000);
  camera.position.set(20, 14, 20);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.8));
  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(30,50,20);
  scene.add(light);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.minDistance = 0.2;
  controls.maxDistance = 500;

  window.addEventListener("resize", onResize);

  loadModel();
  animate();
}

// LOAD MODEL
function loadModel() {
  const loader = new THREE.GLTFLoader();
  loader.load(CONFIG.glbUrl, function(gltf){

    model = gltf.scene;

    let index = 0;
    model.traverse(obj=>{
      if(!obj.isMesh) return;
      nodeIndexMap.set(index,{
        node:obj,
        origMat: obj.material
      });
      index++;
    });

    scene.add(model);
    fitCamera();
    document.getElementById("loading").style.display="none";

    if(urlNodeIndex>=0){
      selectByIndex(urlNodeIndex);
    }

  });
}

// SELECT BY INDEX
function selectByIndex(index){
  const record = nodeIndexMap.get(index);
  if(!record) return;

  clearHighlight();
  applyHighlight(record);
  animateCameraTo(record.node);
  document.getElementById("btn-reset").classList.add("visible");
}

// HIGHLIGHT
function applyHighlight(record){
  const orig = Array.isArray(record.origMat)?record.origMat:[record.origMat];
  const hl = orig.map(m=>{
    const c = m.clone();
    c.color = new THREE.Color(CONFIG.highlightColor);
    c.emissive = new THREE.Color(CONFIG.highlightColor);
    c.emissiveIntensity = CONFIG.highlightEmissive;
    c.map=null;
    return c;
  });
  record.node.material = hl.length===1?hl[0]:hl;
  highlighted = {record, hl};
}

function clearHighlight(){
  if(!highlighted) return;
  highlighted.record.node.material = highlighted.record.origMat;
  highlighted.hl.forEach(m=>m.dispose());
  highlighted=null;
}

// CAMERA FOCUS
function animateCameraTo(obj){
  const box = new THREE.Box3().setFromObject(obj);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x,size.y,size.z,0.2);

  const dist = Math.min(
    Math.max(maxDim*CONFIG.cameraZoom, CONFIG.cameraMinDist),
    CONFIG.cameraMaxDist
  );

  const newPos = new THREE.Vector3(
    center.x + dist*0.7,
    center.y + dist*0.6,
    center.z + dist*0.7
  );

  camAnimTarget = {position:newPos, lookAt:center.clone()};
  isAnimating=true;
}

// FIT FULL MODEL
function fitCamera(){
  if(!model) return;
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const dist = Math.max(size.x,size.y,size.z)*1.5;

  camAnimTarget={
    position:new THREE.Vector3(
      center.x+dist*0.7,
      center.y+dist*0.5,
      center.z+dist*0.7
    ),
    lookAt:center.clone()
  };
  isAnimating=true;
}

// RESET
window.resetView=function(){
  clearHighlight();
  fitCamera();
  document.getElementById("btn-reset").classList.remove("visible");
}

// ANIMATE LOOP
function animate(){
  requestAnimationFrame(animate);

  if(isAnimating && camAnimTarget){
    camera.position.lerp(camAnimTarget.position, CONFIG.cameraLerp);
    controls.target.lerp(camAnimTarget.lookAt, CONFIG.cameraLerp);

    if(camera.position.distanceTo(camAnimTarget.position)<0.02){
      isAnimating=false;
    }
  }

  controls.update();
  renderer.render(scene,camera);
}

// RESIZE
function onResize(){
  const wrap=document.getElementById("canvas-wrap");
  camera.aspect=wrap.clientWidth/wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
}

window.addEventListener("load",init);

</script>
</body>
</html>
