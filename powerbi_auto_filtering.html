<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warehouse 3D Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
html, body {
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
    background:#0b0c0e;
}
#canvas-wrap {
    position:fixed;
    inset:0;
}
</style>
</head>

<body>
<div id="canvas-wrap"></div>

<script>

// ================= CONFIG =================
const CONFIG = {
  glbUrl:'https://sharifsharifzada.github.io/warehouse-3d-viewer/warehouse-3d-allin1.glb',
  accessToken:'Birmarket-Secure-2024-Y10G2P7M4',
  cameraLerp:0.08,
  cameraZoom:2.5,      // proportional zoom factor
  cameraMinDist:1.0,   // never closer than this
  cameraMaxDist:12     // never further than this from selected container
};

// ================= URL PARAMS =================
const params = new URLSearchParams(window.location.search);
const urlToken = params.get('token');
const urlContainer = params.get('container');
const urlNodeIndex = params.get('nodeindex') !== null ? parseInt(params.get('nodeindex')) : -1;

// ================= TOKEN VALIDATION =================
function validateAccess(){
  if(urlToken !== CONFIG.accessToken){
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;
                  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
                  color:white;flex-direction:column;font-family:Arial,sans-serif;">
        <div style="font-size:100px;margin-bottom:30px;">🔒</div>
        <h1 style="font-size:48px;margin:20px 0;">Access Denied</h1>
        <p style="font-size:18px;opacity:0.8;">Unauthorized access to this resource</p>
      </div>
    `;
    throw new Error('Unauthorized');
  }
  console.log('✅ Access granted');
}

validateAccess();

// ================= STATE =================
let scene, camera, renderer, controls, model;
let allObjects = [];
let nodeIndexMap = new Map();   // traverse index → item
let originalMaterials = new Map();
let highlighted = null;
let camAnimTarget = null;
let isAnimating = false;
let glbLoaded = false;

console.log('🎯 container param:', urlContainer, '| nodeindex param:', urlNodeIndex);

// ================= INIT =================
function init(){
  const wrap = document.getElementById('canvas-wrap');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf5f5f5);

  camera = new THREE.PerspectiveCamera(45, wrap.clientWidth/wrap.clientHeight, 0.1, 2000);
  camera.position.set(20, 14, 20);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.75));
  const sun = new THREE.DirectionalLight(0xffffff, 1);
  sun.position.set(30, 50, 20);
  scene.add(sun);
  const sun2 = new THREE.DirectionalLight(0xffffff, 0.5);
  sun2.position.set(-30, 30, -20);
  scene.add(sun2);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.9 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  scene.add(ground);

  const grid = new THREE.GridHelper(500, 100, 0xcccccc, 0xe0e0e0);
  grid.position.y = 0.01;
  scene.add(grid);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.enableZoom   = true;
  controls.enableRotate = true;
  controls.enablePan    = true;

  window.addEventListener('resize', onResize);
  loadModel();
  animate();
}

// ================= LOAD MODEL =================
function loadModel(){
  const loader = new THREE.GLTFLoader();
  console.log('📦 Loading:', CONFIG.glbUrl);

  loader.load(
    CONFIG.glbUrl,
    function(gltf){
      console.log('✅ GLB Loaded');
      model = gltf.scene;

      // Centre model at ground level
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.set(-center.x, -box.min.y, -center.z);

      let ti = 0;
      model.traverse((child) => {
        const match = child.name?.match(/^(\d+)(?:\.(\d+))?$/);
        const numericId = match ? parseInt(match[1]) : null;

        const item = {
          object:    child,
          name:      child.name || '',
          uuid:      child.uuid,
          type:      child.type,
          numericId: numericId,
          nodeIndex: ti
        };
        allObjects.push(item);
        nodeIndexMap.set(ti, item);
        ti++;

        // Store original materials
        if(child.isMesh){
          if(Array.isArray(child.material)){
            child.material.forEach((mat, idx) => {
              originalMaterials.set(child.uuid + '_' + idx, mat.clone());
            });
          } else {
            originalMaterials.set(child.uuid, child.material.clone());
          }
        }
      });

      allObjects.forEach(item => { item.object.visible = true; });
      scene.add(model);
      glbLoaded = true;

      if(urlNodeIndex >= 0){
        setTimeout(() => selectByIndex(urlNodeIndex), 500);
      } else if(urlContainer){
        setTimeout(() => selectContainer(urlContainer), 500);
      } else {
        fitCameraToModel();
      }
    },
    (xhr) => {
      if(xhr.lengthComputable){
        const pct = (xhr.loaded / xhr.total * 100).toFixed(0);
        console.log('Loading: ' + pct + '%');
      }
    },
    (error) => { console.error('❌ Error loading GLB:', error); }
  );
}

// ================= SELECT BY NODE INDEX (primary - from PBI) =================
function selectByIndex(index){
  if(!glbLoaded){ console.log('⏳ Not loaded yet'); return; }
  const item = nodeIndexMap.get(index);

  resetMaterials();

  if(!item){
    console.log('❌ Node index not found:', index);
    fitCameraToModel();
    return;
  }

  console.log('✅ Selecting node index', index, '→', item.name);
  applyHighlight(item.object);
  animateCameraTo(item.object);
}

// ================= SELECT BY CONTAINER ID STRING (fallback) =================
function selectContainer(containerIdentifier){
  if(!glbLoaded){ return; }
  if(!containerIdentifier || containerIdentifier === ''){
    resetToFullView(); return;
  }

  const targetId = parseInt(containerIdentifier);
  if(isNaN(targetId)){
    console.log('❌ Invalid numeric ID:', containerIdentifier);
    resetToFullView(); return;
  }

  resetMaterials();

  const matchedObjects = allObjects.filter(obj => obj.numericId === targetId);
  console.log('Found', matchedObjects.length, 'match(es) for ID', targetId);

  if(matchedObjects.length > 0){
    // Highlight all matches, zoom to first
    matchedObjects.forEach(item => applyHighlight(item.object));
    animateCameraTo(matchedObjects[0].object);
  } else {
    console.log('❌ Not found:', targetId);
    fitCameraToModel();
  }
}

// ================= HIGHLIGHT — no scale change, normal size =================
function applyHighlight(obj){
  const yellowMat = new THREE.MeshStandardMaterial({
    color:            0xff6a00,   // vivid orange
    emissive:         0xff6a00,
    emissiveIntensity: 3.0,
    roughness:        0.3,
    metalness:        0.2,
    side:             THREE.DoubleSide
  });

  if(obj.isMesh){
    if(Array.isArray(obj.material)){
      obj.material = obj.material.map(() => yellowMat.clone());
    } else {
      obj.material = yellowMat.clone();
    }
    obj.renderOrder = 999;
    obj.visible = true;
  }

  obj.traverse((child) => {
    if(child.isMesh){
      if(Array.isArray(child.material)){
        child.material = child.material.map(() => yellowMat.clone());
      } else {
        child.material = yellowMat.clone();
      }
      child.renderOrder = 999;
      child.visible = true;
    }
  });

  // ✅ NO scale change — object stays at normal size (1, 1, 1)
}

// ================= RESET MATERIALS =================
function resetMaterials(){
  allObjects.forEach(item => {
    if(item.object.isMesh){
      if(Array.isArray(item.object.material)){
        item.object.material = item.object.material.map((_, idx) => {
          const orig = originalMaterials.get(item.object.uuid + '_' + idx);
          return orig ? orig.clone() : item.object.material[idx];
        });
      } else {
        const orig = originalMaterials.get(item.object.uuid);
        if(orig) item.object.material = orig.clone();
      }
      item.object.renderOrder = 0;
    }
    // ✅ NO scale reset needed since we never change scale
  });
}

// ================= RESET TO FULL VIEW =================
function resetToFullView(){
  resetMaterials();
  fitCameraToModel();
}

// ================= CAMERA — fit full model =================
function fitCameraToModel(){
  if(!model) return;
  const box  = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const dist   = Math.max(size.x, size.y, size.z) * 0.9;

  camAnimTarget = {
    position: new THREE.Vector3(
      center.x + dist * 0.6,
      center.y + dist * 0.45,
      center.z + dist * 0.6
    ),
    lookAt: center.clone()
  };
  isAnimating = true;
}

// ================= CAMERA — zoom close to selected object =================
function animateCameraTo(obj){
  const box    = new THREE.Box3().setFromObject(obj);
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z, 0.3);

  const dist = Math.min(
    Math.max(maxDim * CONFIG.cameraZoom, CONFIG.cameraMinDist),
    CONFIG.cameraMaxDist
  );

  camAnimTarget = {
    position: new THREE.Vector3(
      center.x + dist * 0.7,
      center.y + dist * 0.6,
      center.z + dist * 0.7
    ),
    lookAt: center.clone()
  };
  isAnimating = true;
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  if(isAnimating && camAnimTarget){
    camera.position.lerp(camAnimTarget.position, CONFIG.cameraLerp);
    controls.target.lerp(camAnimTarget.lookAt, CONFIG.cameraLerp);
    if(camera.position.distanceTo(camAnimTarget.position) < 0.02){
      camera.position.copy(camAnimTarget.position);
      controls.target.copy(camAnimTarget.lookAt);
      isAnimating = false;
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

// ================= RESIZE =================
function onResize(){
  const wrap = document.getElementById('canvas-wrap');
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
}

window.addEventListener('load', init);
</script>
</body>
</html>
