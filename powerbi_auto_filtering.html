<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warehouse 3D Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
html, body {
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
    background:#0b0c0e;
}
#canvas-wrap {
    position:fixed;
    inset:0;
}
</style>
</head>

<body>
<div id="canvas-wrap"></div>

<script>

// ================= CONFIG =================
const CONFIG = {
  glbUrl:'https://sharifsharifzada.github.io/warehouse-3d-viewer/warehouse-3d-allin1.glb',
  accessToken:'Birmarket-Secure-2024-Y10G2P7M4',
  cameraLerp:0.08,
  cameraZoom:0.8,      // VERY CLOSE zoom (was 2.0)
  cameraMinDist:0.3,
  cameraMaxDist:50
};

// ================= URL PARAMS =================
const params = new URLSearchParams(window.location.search);
const urlToken = params.get('token');
const urlContainer = params.get('container');

// ================= TOKEN VALIDATION =================
function validateAccess(){
  if(urlToken !== CONFIG.accessToken){
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;
                  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
                  color:white;flex-direction:column;font-family:Arial,sans-serif;">
        <div style="font-size:100px;margin-bottom:30px;">🔒</div>
        <h1 style="font-size:48px;margin:20px 0;">Access Denied</h1>
        <p style="font-size:18px;opacity:0.8;">Unauthorized access to this resource</p>
      </div>
    `;
    throw new Error('Unauthorized');
  }
  console.log('✅ Access granted');
}

validateAccess();

// ================= STATE =================
let scene, camera, renderer, controls, model;
let allObjects = [];
let originalMaterials = new Map();
let highlighted = null;
let camAnimTarget = null;
let isAnimating = false;
let glbLoaded = false;

console.log('🎯 Selected container:', urlContainer);

// ================= INIT =================
function init(){
  const wrap = document.getElementById('canvas-wrap');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b0c0e);  // Always dark background
  scene.fog = null;  // No fog

  camera = new THREE.PerspectiveCamera(45, wrap.clientWidth/wrap.clientHeight, 0.1, 2000);
  camera.position.set(20, 14, 20);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.75));

  const sun = new THREE.DirectionalLight(0xffffff, 1);
  sun.position.set(30, 50, 20);
  scene.add(sun);

  // Add second light for better visibility
  const sun2 = new THREE.DirectionalLight(0xffffff, 0.5);
  sun2.position.set(-30, 30, -20);
  scene.add(sun2);

  // Add ground plane for reference (subtle)
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshStandardMaterial({ 
      color: 0x1a1a1a,  // Very dark gray (visible against black)
      roughness: 0.9
    })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  scene.add(ground);

  // Add grid for spatial reference (very subtle)
  const grid = new THREE.GridHelper(500, 100, 0x2a2a2a, 0x1a1a1a);
  grid.position.y = 0.01;
  scene.add(grid);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;

  window.addEventListener('resize', onResize);

  loadModel();
  animate();
}

// ================= LOAD MODEL =================
function loadModel(){
  const loader = new THREE.GLTFLoader();

  console.log('📦 Loading:', CONFIG.glbUrl);

  loader.load(
    CONFIG.glbUrl,
    function(gltf){
      console.log('✅ GLB Loaded Successfully!');

      model = gltf.scene;

      // Center model
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      model.position.set(-center.x, -box.min.y, -center.z);

      console.log('═══ SCANNING WAREHOUSE ═══');

      // Collect all objects with numeric IDs
      let numericObjects = 0;
      model.traverse((child) => {
        // Extract numeric ID from name (e.g., "1234" or "1234.001")
        const match = child.name?.match(/^(\d+)(?:\.(\d+))?$/);
        const numericId = match ? parseInt(match[1]) : null;

        allObjects.push({
          object: child,
          name: child.name || '',
          uuid: child.uuid,
          type: child.type,
          numericId: numericId
        });

        if(numericId !== null){
          numericObjects++;
        }

        // Store original materials
        if(child.isMesh){
          if(Array.isArray(child.material)){
            child.material.forEach((mat, idx) => {
              originalMaterials.set(`${child.uuid}_${idx}`, mat.clone());
            });
          } else {
            originalMaterials.set(child.uuid, child.material.clone());
          }
        }
      });

      console.log(`Objects with numeric IDs: ${numericObjects}`);

      // Make all objects visible initially
      allObjects.forEach(item => {
        if(item.object.isMesh || item.object.isGroup || item.object.isObject3D){
          item.object.visible = true;
        }
      });

      scene.add(model);

      glbLoaded = true;

      // Apply selection if provided
      if(urlContainer){
        setTimeout(() => selectContainer(urlContainer), 500);
      } else {
        console.log('📦 No selection - showing full warehouse');
        fitCameraCloser();
      }
    },
    (xhr) => {
      const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
      if(percent % 20 === 0 || percent === '100'){
        console.log(`Loading: ${percent}%`);
      }
    },
    (error) => {
      console.error('❌ Error loading GLB:', error);
    }
  );
}

// ================= SELECT CONTAINER BY ID =================
function selectContainer(containerIdentifier){
  if(!glbLoaded){
    console.log('⏳ Model not loaded yet');
    return;
  }

  // If no container, show all
  if(!containerIdentifier || containerIdentifier === ''){
    console.log('📦 No container selected - showing whole warehouse');
    resetToFullView();
    return;
  }

  console.log('\n═══════════════════════════════');
  console.log('🎯 Selecting container ID:', containerIdentifier);

  // Parse container ID
  const targetId = parseInt(containerIdentifier);
  if(isNaN(targetId)){
    console.log('❌ Invalid container ID - must be numeric');
    resetToFullView();
    return;
  }

  console.log(`✓ Parsed target ID: ${targetId}`);

  // Find objects matching the target ID
  const matchedObjects = allObjects.filter(obj => {
    if(obj.numericId === targetId){
      console.log('✅ MATCH FOUND:', obj.name, '→ ID:', obj.numericId, '→ Type:', obj.type);
      return true;
    }
    return false;
  });

  console.log(`Found ${matchedObjects.length} matching object(s) for ID ${targetId}`);

  // STEP 1: Hide ALL objects
  console.log('🔄 Hiding all objects first...');
  let hiddenCount = 0;
  allObjects.forEach(item => {
    if(item.object.isMesh || item.object.isGroup || item.object.isObject3D){
      item.object.visible = false;
      hiddenCount++;
    }

    // Reset material
    if(item.object.isMesh){
      const originalMat = originalMaterials.get(item.object.uuid);
      if(originalMat){
        item.object.material = originalMat.clone();
      }
      item.object.scale.set(1, 1, 1);
    }
  });
  console.log(`  Hidden ${hiddenCount} objects`);

  if(matchedObjects.length > 0){
    console.log('🎨 Showing and highlighting ONLY selected objects...');

    // STEP 2: Show and highlight ONLY matched objects
    matchedObjects.forEach((item, index) => {
      console.log(`  Processing match ${index + 1}:`, item.name, 'Type:', item.type);
      
      // Make visible
      item.object.visible = true;
      
      // Make sure ALL parents are visible
      let parent = item.object.parent;
      let parentLevel = 0;
      while(parent){
        parent.visible = true;
        parentLevel++;
        console.log(`    Made parent ${parentLevel} visible:`, parent.name || parent.type);
        parent = parent.parent;
      }

      // Apply FULL YELLOW highlight
      highlightObject(item.object);
      console.log(`  ✅ ${index + 1}. Highlighted: ${item.name}`);
    });

    // STEP 3: Zoom to selected container
    console.log('📷 Focusing camera (close zoom)...');
    animateCameraTo(matchedObjects[0].object);
    console.log('✅ Camera focused on container');
  } else {
    console.log('❌ No container found with ID:', targetId);
    resetToFullView();
  }

  console.log('═══════════════════════════════\n');
}

// ================= FULL YELLOW HIGHLIGHT =================
function highlightObject(obj){
  const yellowMaterial = new THREE.MeshStandardMaterial({
    color: 0xffff00,          // FULL YELLOW
    emissive: 0xffff00,       // Yellow glow
    emissiveIntensity: 3.0,   // Very bright
    roughness: 0.4,
    metalness: 0.1,
    transparent: false,
    opacity: 1.0
  });

  // Apply to the object itself if it's a mesh
  if(obj.isMesh){
    if(Array.isArray(obj.material)){
      obj.material = obj.material.map(() => yellowMaterial.clone());
    } else {
      obj.material = yellowMaterial.clone();
    }
    obj.renderOrder = 999;
    console.log('  ✅ Applied yellow to:', obj.name);
  }

  // Apply to all child meshes
  obj.traverse((child) => {
    if(child.isMesh && child !== obj){
      if(Array.isArray(child.material)){
        child.material = child.material.map(() => yellowMaterial.clone());
      } else {
        child.material = yellowMaterial.clone();
      }
      child.renderOrder = 999;
      console.log('  ✅ Applied yellow to child:', child.name);
    }
  });

  // Scale effect
  if(obj.scale){
    obj.scale.set(1.15, 1.15, 1.15);
  }
}

// ================= RESET TO FULL VIEW =================
function resetToFullView(){
  console.log('🔄 Resetting to full warehouse view');

  // Show all objects and reset materials
  allObjects.forEach(item => {
    if(item.object.isMesh || item.object.isGroup || item.object.isObject3D){
      item.object.visible = true;
    }

    // Reset material
    if(item.object.isMesh){
      const originalMat = originalMaterials.get(item.object.uuid);
      if(originalMat){
        item.object.material = originalMat.clone();
      }
      item.object.renderOrder = 0;
    }

    // Reset scale
    item.object.scale.set(1, 1, 1);
  });

  fitCameraCloser();
}

// ================= DEFAULT CLOSER VIEW =================
function fitCameraCloser(){
  if(!model) return;

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());

  const dist = Math.max(size.x, size.y, size.z) * 0.9;

  camAnimTarget = {
    position: new THREE.Vector3(
      center.x + dist * 0.6,
      center.y + dist * 0.45,
      center.z + dist * 0.6
    ),
    lookAt: center.clone()
  };

  isAnimating = true;
}

// ================= FOCUS ON SELECTED =================
function animateCameraTo(obj){
  const box = new THREE.Box3().setFromObject(obj);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z, 0.3);

  const dist = Math.min(
    Math.max(maxDim * CONFIG.cameraZoom, CONFIG.cameraMinDist),
    CONFIG.cameraMaxDist
  );

  camAnimTarget = {
    position: new THREE.Vector3(
      center.x + dist * 0.7,
      center.y + dist * 0.6,
      center.z + dist * 0.7
    ),
    lookAt: center.clone()
  };

  isAnimating = true;
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  if(isAnimating && camAnimTarget){
    camera.position.lerp(camAnimTarget.position, CONFIG.cameraLerp);
    controls.target.lerp(camAnimTarget.lookAt, CONFIG.cameraLerp);

    if(camera.position.distanceTo(camAnimTarget.position) < 0.02){
      isAnimating = false;
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

// ================= RESIZE =================
function onResize(){
  const wrap = document.getElementById('canvas-wrap');
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
}

window.addEventListener('load', init);

</script>
</body>
</html>
