<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warehouse 3D Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
html, body {
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
    background:#0b0c0e;
}
#canvas-wrap {
    position:fixed;
    inset:0;
}
</style>
</head>

<body>
<div id="canvas-wrap"></div>

<script>

// ================= CONFIG =================
const CONFIG = {
  glbUrl:'https://sharifsharifzada.github.io/warehouse-3d-viewer/warehouse-3d-with-textures1.glb',
  cameraLerp:0.08,
  cameraZoom:2.0,
  cameraMinDist:0.3,
  cameraMaxDist:50
};

// ================= URL PARAM =================
const params=new URLSearchParams(window.location.search);
const urlNodeIndex=params.get('nodeindex')!==null?parseInt(params.get('nodeindex')):-1;

// ================= STATE =================
let scene,camera,renderer,controls,model;
let nodeIndexMap=new Map();
let highlighted=null;
let camAnimTarget=null;
let isAnimating=false;

// ================= INIT =================
function init(){

  const wrap=document.getElementById('canvas-wrap');

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0b0c0e);

  camera=new THREE.PerspectiveCamera(45,wrap.clientWidth/wrap.clientHeight,0.1,2000);
  camera.position.set(20,14,20);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.75));

  const sun=new THREE.DirectionalLight(0xffffff,1);
  sun.position.set(30,50,20);
  scene.add(sun);

  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  controls.dampingFactor=0.07;

  window.addEventListener('resize',onResize);

  loadModel();
  animate();
}

// ================= LOAD MODEL =================
function loadModel(){

  const loader=new THREE.GLTFLoader();

  loader.load(CONFIG.glbUrl,function(gltf){

    model=gltf.scene;
    let index=0;

    model.traverse(obj=>{
      if(!obj.isMesh)return;
      nodeIndexMap.set(index,{
        node:obj,
        origMat:obj.material
      });
      index++;
    });

    scene.add(model);

    // Default closer view
    fitCameraCloser();

    if(urlNodeIndex>=0){
      selectByIndex(urlNodeIndex);
    }

  });
}

// ================= SELECT =================
function selectByIndex(index){

  const record=nodeIndexMap.get(index);
  if(!record)return;

  clearHighlight();
  applyHighlight(record);
  animateCameraTo(record.node);
}

// ================= FULL YELLOW HIGHLIGHT (entire container) =================
function applyHighlight(record){

  const yellowMaterial = new THREE.MeshStandardMaterial({
      color: 0xffff00,          // FULL YELLOW
      emissive: 0xffff00,       // Yellow glow
      emissiveIntensity: 3.0,
      roughness: 0.4,
      metalness: 0.1
  });

  const meshes = [];

  // Traverse the whole container hierarchy
  record.node.traverse((obj)=>{
      if(obj.isMesh){
          // Override all materials
          if(Array.isArray(obj.material)){
              const newMats = obj.material.map(() => yellowMaterial.clone());
              obj.material = newMats;
          } else {
              obj.material = yellowMaterial.clone();
          }
          obj.renderOrder = 1;
          meshes.push(obj);
      }
  });

  // Optional: slightly scale selected container
  record.node.scale.set(1.15,1.15,1.15);

  highlighted = {
      record: record,
      hl: meshes
  };
}

// ================= RESET HIGHLIGHT =================
function clearHighlight(){
  if(!highlighted) return;

  highlighted.hl.forEach(mesh=>{
      // Reset original material
      const originalMat = highlighted.record.origMat;
      mesh.material = Array.isArray(originalMat) ? originalMat : originalMat;
      mesh.renderOrder = 0;
  });

  // Reset scale
  highlighted.record.node.scale.set(1,1,1);

  highlighted = null;
}

// ================= DEFAULT CLOSER VIEW =================
function fitCameraCloser(){

  if(!model)return;

  const box=new THREE.Box3().setFromObject(model);
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3());

  const dist=Math.max(size.x,size.y,size.z)*0.9;

  camAnimTarget={
    position:new THREE.Vector3(
      center.x+dist*0.6,
      center.y+dist*0.45,
      center.z+dist*0.6
    ),
    lookAt:center.clone()
  };

  isAnimating=true;
}

// ================= FOCUS ON SELECTED =================
function animateCameraTo(obj){

  const box=new THREE.Box3().setFromObject(obj);
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3());
  const maxDim=Math.max(size.x,size.y,size.z,0.3);

  const dist=Math.min(
    Math.max(maxDim*CONFIG.cameraZoom,CONFIG.cameraMinDist),
    CONFIG.cameraMaxDist
  );

  camAnimTarget={
    position:new THREE.Vector3(
      center.x+dist*0.7,
      center.y+dist*0.6,
      center.z+dist*0.7
    ),
    lookAt:center.clone()
  };

  isAnimating=true;
}

// ================= LOOP =================
function animate(){

  requestAnimationFrame(animate);

  if(isAnimating && camAnimTarget){
    camera.position.lerp(camAnimTarget.position,CONFIG.cameraLerp);
    controls.target.lerp(camAnimTarget.lookAt,CONFIG.cameraLerp);

    if(camera.position.distanceTo(camAnimTarget.position)<0.02){
      isAnimating=false;
    }
  }

  controls.update();
  renderer.render(scene,camera);
}

// ================= RESIZE =================
function onResize(){

  const wrap=document.getElementById('canvas-wrap');

  camera.aspect=wrap.clientWidth/wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
}

window.addEventListener('load',init);

</script>
</body>
</html>
